<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Bolão Colaboradores Camino</title>
<!-- Fontes e Ícones -->
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
<script src="https://unpkg.com/lucide@latest"></script>
<style>
    :root {
        --primary: #00ff88;
        --primary-glow: rgba(0, 255, 136, 0.4);
        --bg: #000000;
        --surface: #0a0a0a;
        --surface-accent: #121212;
        --border: rgba(255, 255, 255, 0.08);
        --text-main: #ffffff;
        --text-dim: #999999;
        --red-alert: #ff4d4d;
        --yellow-warn: #ffcc00;
        --paid-color: #00ff88;
        --partial-color: #ffcc00;
        --pending-color: #333333;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }

    body {
        background-color: var(--bg);
        color: var(--text-main);
        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        padding: 10px;
        overflow: hidden;
        background: radial-gradient(circle at center, #001a0d 0%, #000000 100%);
    }

    .container {
        background: var(--surface);
        width: 100%;
        max-width: 450px;
        height: auto;
        max-height: 95vh;
        border-radius: 35px;
        padding: 20px;
        border: 1px solid var(--border);
        box-shadow: 0 30px 60px rgba(0,0,0,0.8), 0 0 20px rgba(0, 255, 136, 0.05);
        text-align: center;
        display: flex; flex-direction: column;
        transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        position: relative; overflow: hidden;
    }

    .container.expanded { height: 90vh; }

    .scrollable-content { 
        overflow-y: auto; 
        scrollbar-width: none; 
        flex-shrink: 1;
    }
    .scrollable-content::-webkit-scrollbar { display: none; }

    .hero-badge { 
        background: rgba(0, 255, 136, 0.1); 
        color: var(--primary); 
        padding: 6px 15px; 
        border-radius: 100px; 
        font-size: 0.65rem; 
        font-weight: 800; 
        text-transform: uppercase; 
        letter-spacing: 1.5px; 
        border: 1px solid rgba(0, 255, 136, 0.2); 
        margin-bottom: 12px; 
        display: inline-block; 
    }

    .logo-img { 
        display: block; width: 100%; max-width: 220px; height: auto; /* Tamanho aumentado de 160px para 220px */
        margin: 0 auto 15px auto; 
        border-radius: 15px;
    }

    .info-header { font-size: 0.85rem; color: var(--text-dim); margin-bottom: 5px; font-weight: 600; }
    .date-header { font-size: 0.75rem; color: var(--text-dim); margin-bottom: 15px; opacity: 0.7; }

    .countdown-card { 
        background: var(--surface-accent); 
        border-radius: 20px; 
        padding: 12px; 
        margin-bottom: 15px; 
        border: 1px solid var(--border);
    }
    .timer-grid { display: flex; justify-content: center; gap: 10px; }
    .time-box { display: flex; flex-direction: column; align-items: center; width: 42px; }
    .time-val { font-size: 1.2rem; font-weight: 800; color: var(--primary); line-height: 1; text-shadow: 0 0 10px var(--primary-glow); }
    .time-unit { font-size: 0.5rem; margin-top: 4px; color: var(--text-dim); font-weight: 800; text-transform: uppercase; }

    .progress-area { margin-bottom: 20px; background: rgba(255,255,255,0.02); padding: 15px; border-radius: 25px; border: 1px solid var(--border); }
    .progress-capsule { position: relative; height: 10px; background: rgba(255,255,255,0.05); border-radius: 100px; overflow: hidden; margin-bottom: 12px; }
    .metallic-bar { position: absolute; top: 0; left: 0; bottom: 0; height: 100%; transition: width 1s ease; border-radius: 100px; }
    .bar-layer-reg { z-index: 1; background: var(--pending-color); }
    .bar-layer-partial { z-index: 2; background: var(--partial-color); }
    .bar-layer-paid { z-index: 3; background: var(--paid-color); box-shadow: 0 0 15px var(--primary-glow); }
    .progress-legend { display: flex; justify-content: space-between; font-size: 0.65rem; font-weight: 800; color: var(--text-dim); }
    .progress-money { font-size: 0.8rem; color: var(--primary); margin-top: 10px; font-weight: 800; }

    input.form-input { 
        width: 100%; padding: 14px; margin-bottom: 10px; 
        background: rgba(255,255,255,0.03); border: 1px solid var(--border); border-radius: 16px; 
        font-size: 0.9rem; text-align: center; color: white; outline: none; transition: 0.3s;
    }
    input.form-input:focus { border-color: var(--primary); box-shadow: 0 0 15px rgba(0, 255, 136, 0.1); }

    .action-row { display: grid; grid-template-columns: 1fr 1.5fr; gap: 8px; margin-bottom: 10px; }
    .btn-green-block { 
        background: var(--primary); color: #000; padding: 14px; border-radius: 16px; font-weight: 800; font-size: 0.8rem; 
        display: flex; align-items: center; justify-content: center; gap: 8px; box-shadow: 0 10px 20px var(--primary-glow); transition: 0.3s;
        border: none; cursor: pointer;
    }
    .btn-gray-block { background: var(--surface-accent); color: var(--text-dim); padding: 14px; border-radius: 16px; font-weight: 800; font-size: 0.75rem; text-transform: uppercase; border: 1px solid var(--border); cursor: pointer; }
    .btn-list-expand { width: 100%; background: transparent; color: var(--primary); padding: 15px; font-weight: 800; font-size: 0.85rem; border: 1px dashed var(--primary); border-radius: 20px; margin-top: 5px; cursor: pointer; }

    #listaContainer { display: none; flex-direction: column; flex: 1; margin-top: 15px; border-top: 1px solid var(--border); padding-top: 15px; overflow: hidden; }
    .container.expanded #listaContainer { display: flex; animation: fadeIn 0.4s ease; }
    .toolbar { display: flex; flex-direction: column; gap: 12px; padding-bottom: 15px; }
    .filter-row { display: flex; gap: 8px; }
    .search-input-clean { flex: 2; padding: 12px 15px; border: 1px solid var(--border); border-radius: 14px; font-size: 0.8rem; background: rgba(255,255,255,0.03); color: white; outline: none; }
    .filter-select { flex: 1; background: var(--surface-accent); border: 1px solid var(--border); color: white; border-radius: 14px; font-size: 0.75rem; font-weight: 800; cursor: pointer; }
    .admin-row { display: flex; justify-content: space-between; align-items: center; padding: 0 5px; }
    .icon-group { display: flex; gap: 8px; }
    .icon-btn { width: 38px; height: 38px; border-radius: 12px; color: white; display: flex; align-items: center; justify-content: center; cursor: pointer; border: 1px solid var(--border); background: var(--surface-accent); }

    #listaDiv { flex: 1; overflow-y: auto; padding-bottom: 20px; scrollbar-width: none; }
    .list-item { background: transparent; border-bottom: 1px solid var(--border); display: flex; align-items: center; min-height: 60px; transition: 0.2s; padding: 0 5px; }
    .list-item.selected { background: rgba(0, 255, 136, 0.05); }
    .item-left { display: flex; align-items: center; gap: 10px; flex: 1; min-width: 0; }
    .checkbox-icon { font-size: 1.1rem; color: var(--border); cursor: pointer; flex-shrink: 0; }
    .item-name { font-size: 0.8rem; color: var(--text-main); font-weight: 700; text-transform: uppercase; text-align: left; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .pay-btn-container { margin-left: auto; display: flex; align-items: center; gap: 10px; flex-shrink: 0; padding-left: 10px; }
    .btn-pay-row { 
        background: var(--primary); color: #000; padding: 8px 12px; border-radius: 10px; font-size: 0.65rem; font-weight: 800; 
        display: flex; align-items: center; gap: 6px; box-shadow: 0 4px 10px rgba(0, 255, 136, 0.2); cursor: pointer; border: none;
    }

    .modal-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.95); display: none; justify-content: center; align-items: center; z-index: 3000; backdrop-filter: blur(8px); }
    .modal-box { background: var(--surface); border: 1px solid var(--border); width: 100%; max-width: 340px; border-radius: 40px; padding: 25px; text-align: center; }
    .numpad { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-top: 15px; }
    .num-btn { background: var(--surface-accent); color: white; padding: 18px; font-size: 1.2rem; border-radius: 18px; border: 1px solid var(--border); font-weight: 800; cursor: pointer; }
    .btn-checkout { background: var(--primary); color: #000; width: 100%; margin-top: 20px; padding: 18px; border-radius: 20px; font-weight: 800; display: flex; align-items: center; justify-content: center; gap: 10px; cursor: pointer; border: none; }
    .toast { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); background: var(--primary); color: #000; padding: 12px 25px; border-radius: 100px; font-weight: 800; z-index: 5000; display: none; }
</style>
</head>
<body>

<div class="container" id="mainContainer">
    <div id="topContent" class="scrollable-content">
        <div class="hero-badge">🎰 BOLÃO EXCLUSIVO</div>
        <!-- LOGO COM TAMANHO AUMENTADO -->
        <img src="https://drive.google.com/thumbnail?id=1q27xBm87ewP3GKczQ8x7iS6fyH4eMQeO&sz=w1000" alt="Logo" class="logo-img">
        
        <div class="info-header">💰 Cota: R$ 1,00 • 👥 Limite: 60</div>
        <div class="date-header">Pagamento até 25 de Dezembro de 2026</div>

        <div class="countdown-card">
            <div class="timer-grid">
                <div class="time-box"><span class="time-val" id="dias">00</span><span class="time-unit">DIAS</span></div>
                <div class="time-box"><span class="time-val" id="horas">00</span><span class="time-unit">HRS</span></div>
                <div class="time-box"><span class="time-val" id="minutos">00</span><span class="time-unit">MIN</span></div>
                <div class="time-box"><span class="time-val" id="segundos">00</span><span class="time-unit">SEG</span></div>
            </div>
        </div>

        <div class="progress-area">
            <div class="progress-capsule">
                <div class="metallic-bar bar-layer-reg" id="barReg"></div>
                <div class="metallic-bar bar-layer-partial" id="barPartial"></div>
                <div class="metallic-bar bar-layer-paid" id="barPaid"></div>
            </div>
            <div class="progress-legend">
                <div class="legend-item"><span id="txtPaid">0 Pagos</span></div>
                <div class="legend-item"><span id="txtPartial">0 Parc</span></div>
                <div class="legend-item"><span id="txtPend">0 Pend</span></div>
            </div>
            <div class="progress-money" id="pMoney">ARRECADADO: R$ 0,00</div>
        </div>

        <input type="text" class="form-input" id="nome" placeholder="NOME COMPLETO">
        <input type="tel" class="form-input" id="telefone" placeholder="WHATSAPP (COM DDD)">

        <div class="action-row">
            <button class="btn-gray-block" id="btnZapGroup">Grupo</button>
            <button class="btn-green-block" id="btnCadastrar">🚀 PARTICIPAR</button>
        </div>
    </div>

    <button class="btn-list-expand" id="btnToggleLista" onclick="toggleLista()">VER PARTICIPANTES ⌄</button>

    <div id="listaContainer">
        <div class="toolbar">
            <div class="filter-row">
                <input type="text" id="buscar" class="search-input-clean" placeholder="🔎 Nome...">
                <select id="filtroSelect" class="filter-select" onchange="filtrar(this.value)">
                    <option value="todos">FILTRO</option>
                    <option value="todos">TODOS</option>
                    <option value="pagos">PAGOS</option>
                    <option value="parciais">PARCIAIS</option>
                    <option value="pendentes">PENDENTES</option>
                </select>
            </div>
            <div class="admin-row">
                <div style="font-size: 0.6rem; font-weight: 800; color: var(--text-dim); letter-spacing: 1px;">GERENCIAMENTO:</div>
                <div class="icon-group">
                    <button class="icon-btn" onclick="askPass('pagamento')">💰</button>
                    <button class="icon-btn" onclick="askPass('excluir')">🗑️</button>
                </div>
            </div>
        </div>
        <div id="listaDiv"></div>
    </div>
</div>

<div class="modal-overlay" id="modalSenha">
    <div class="modal-box">
        <h3 style="margin-bottom:15px; font-weight:800;">ADMIN ACCESS</h3>
        <div id="senhaDisplay" style="font-size:2rem; letter-spacing:8px; height:45px; color:var(--primary);"></div>
        <div class="numpad">
            <button class="num-btn" onclick="digitar('1')">1</button><button class="num-btn" onclick="digitar('2')">2</button><button class="num-btn" onclick="digitar('3')">3</button>
            <button class="num-btn" onclick="digitar('4')">4</button><button class="num-btn" onclick="digitar('5')">5</button><button class="num-btn" onclick="digitar('6')">6</button>
            <button class="num-btn" onclick="digitar('7')">7</button><button class="num-btn" onclick="digitar('8')">8</button><button class="num-btn" onclick="digitar('9')">9</button>
            <button class="num-btn" style="color:var(--red-alert)" onclick="digitar('C')">C</button><button class="num-btn" onclick="digitar('0')">0</button><button class="num-btn" onclick="fecharModal('modalSenha')">✕</button>
        </div>
    </div>
</div>

<div class="modal-overlay" id="modalConf">
    <div class="modal-box">
        <h2 style="color:var(--primary); font-weight:800;">REGISTRO OK!</h2>
        <p style="color:var(--text-dim); font-size:0.85rem; margin-bottom:20px;">Cota reservada. Pague agora:</p>
        <button class="btn-checkout" id="btnPagarCheckout"><i data-lucide="credit-card"></i> PAGAR AGORA (R$ 1,00)</button>
        <p style="font-size:0.7rem; color:var(--text-dim); margin-top:20px;">Ou PIX manual:</p>
        <p style="font-weight:800; color:var(--primary); font-size:1rem;" id="confPix"></p>
        <button class="btn-gray-block" style="width:100%; margin-top:10px;" id="btnZapConf">ENVIAR COMPROVANTE</button>
        <button class="btn-gray-block" style="width:100%; margin-top:10px; border:none; background:transparent;" onclick="fecharModal('modalConf')">FECHAR</button>
    </div>
</div>

<div class="modal-overlay" id="modalPagamento">
    <div class="modal-box">
        <h3 style="font-weight:800;">BAIXA MANUAL</h3>
        <p id="pgtoNome" style="color:var(--primary); font-size:0.8rem; margin:10px 0;"></p>
        <input type="number" id="pgtoValor" placeholder="0.00" style="font-size:1.8rem; margin:10px 0; width:100%; text-align:center; padding:12px; background:rgba(255,255,255,0.03); border:1px solid var(--border); border-radius:18px; color:white;">
        <div style="display:flex; gap:10px;">
            <button class="btn-gray-block" style="flex:1" onclick="setVal(0)">ZERAR</button><button class="btn-green-block" style="flex:1" onclick="setVal(1)">TOTAL</button>
        </div>
        <button class="btn-green-block" style="width:100%; margin-top:15px;" id="btnSalvarPgto">CONFIRMAR</button>
    </div>
</div>

<div id="toast" class="toast">✅ PAGAMENTO CONFIRMADO!</div>

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-app.js";
import { getDatabase, ref, push, get, update, remove } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-database.js";

const CONFIG = { 
    LIMITE: 60, VALOR: 1, VALOR_CENTAVOS: 100, PIX: "(99) 9 9102-6112", SENHA: '6261', 
    TG_TOKEN: "8307035824:AAFsKe4l1WgbZI1uez-n06Vt-TYiuhZLMt8", TG_CHAT: "861365063",
    INFINITE_TAG: "lauriuche", URL_LOGO: "https://drive.google.com/thumbnail?id=1q27xBm87ewP3GKczQ8x7iS6fyH4eMQeO&sz=w1000",
    NOME_PRODUTO: "Cota Bolão Camino", URL_RETORNO_FALLBACK: "https://wa.me/5599991026112"
};

const app = initializeApp({
  apiKey: "AIzaSyCvXGUdvZkqtSMMn8VmTOXLA9PXqR85gSk", authDomain: "vagner-34d5b.firebaseapp.com", databaseURL: "https://vagner-34d5b.firebaseio.com", projectId: "vagner-34d5b", storageBucket: "vagner-34d5b.firebasestorage.app", messagingSenderId: "711539772164", appId: "1:711539772164:web:e7736325e6ed365c0bde51"
});
const db = getDatabase(app);
const dbRef = ref(db, "participantes");

let parts = [], sels = [], acao = null, filtro = 'todos';

lucide.createIcons();

window.toggleLista = () => {
    const container = document.getElementById('mainContainer');
    const btn = document.getElementById('btnToggleLista');
    if (container.classList.contains('expanded')) {
        container.classList.remove('expanded');
        document.getElementById('topContent').style.display = 'block';
        btn.innerText = "VER PARTICIPANTES ⌄";
    } else {
        container.classList.add('expanded');
        document.getElementById('topContent').style.display = 'none';
        btn.innerText = "VOLTAR";
        updateData(); renderList();
    }
};

window.fecharModal = (id) => document.getElementById(id).style.display = 'none';
window.setVal = (v) => document.getElementById('pgtoValor').value = v;
window.filtrar = (f) => { filtro = f; renderList(); };
window.digitar = (k) => {
    const d = document.getElementById('senhaDisplay');
    if(k==='C') d.innerText = '';
    else if(d.innerText.length < 4) { d.innerText += k; if(d.innerText.length === 4) setTimeout(checkPass, 200); }
};
window.askPass = (act) => {
    if(!sels.length && act!=='telegram') return alert("Selecione um participante!");
    acao = act; document.getElementById('senhaDisplay').innerText='';
    document.getElementById('modalSenha').style.display='flex';
};
function checkPass(){
    if(document.getElementById('senhaDisplay').innerText === CONFIG.SENHA){ fecharModal('modalSenha'); execAcao(); } 
    else { alert("Senha Incorreta"); document.getElementById('senhaDisplay').innerText=''; }
}

async function verificarRetornoPagamento() {
    const params = new URLSearchParams(window.location.search);
    const paidKey = params.get('paid_key');
    if (paidKey) {
        window.history.replaceState({}, document.title, window.location.pathname);
        try {
            await update(ref(db, `participantes/${paidKey}`), { valorPago: CONFIG.VALOR });
            document.getElementById('toast').style.display = 'block';
            confetti({ particleCount: 200, spread: 80, origin: { y: 0.7 } });
            setTimeout(() => document.getElementById('toast').style.display = 'none', 5000);
            await updateData(); renderList();
        } catch (e) { console.error(e); }
    }
}

window.triggerCheckout = async (nome, telefone, btnElement, participantKey) => {
    const originalContent = btnElement.innerHTML;
    btnElement.disabled = true;
    btnElement.innerHTML = `<div class="spinner"></div>`;
    let baseUrl = window.location.origin + window.location.pathname;
    if (!baseUrl.startsWith('http')) baseUrl = CONFIG.URL_RETORNO_FALLBACK;
    const returnUrl = baseUrl + "?paid_key=" + participantKey;
    let cleanPhone = telefone.replace(/\D/g, '');
    if (!cleanPhone.startsWith('55')) cleanPhone = '55' + cleanPhone;

    const payload = {
        "handle": CONFIG.INFINITE_TAG,
        "order_nsu": "BOL" + Date.now().toString().slice(-9),
        "redirect_url": returnUrl,
        "customer": { "name": nome.replace(/[^\w\s]/gi, '').trim().substring(0,40), "email": `c${participantKey.slice(-5)}@vagner.com`, "phone_number": cleanPhone },
        "items": [{ "quantity": 1, "price": CONFIG.VALOR_CENTAVOS, "description": CONFIG.NOME_PRODUTO, "image": CONFIG.URL_LOGO }]
    };

    try {
        const response = await fetch('https://corsproxy.io/?' + encodeURIComponent('https://api.infinitepay.io/invoices/public/checkout/links'), {
            method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload)
        });
        const data = await response.json();
        if (data.url) window.location.href = data.url; else throw new Error(data.message || "Erro API");
    } catch (error) { alert("Erro no checkout: " + error.message); btnElement.disabled = false; btnElement.innerHTML = originalContent; lucide.createIcons(); }
};

async function updateData(){
    const snap = await get(dbRef);
    parts = snap.exists() ? Object.entries(snap.val()).map(([k,v]) => ({...v, key:k})) : [];
    const paidCount = parts.filter(p => (p.valorPago||0) >= CONFIG.VALOR).length;
    const partialCount = parts.filter(p => (p.valorPago||0) > 0 && (p.valorPago||0) < CONFIG.VALOR).length;
    const totalMoney = parts.reduce((a,b)=>a+(b.valorPago||0),0);
    document.getElementById('barReg').style.width = `${(parts.length / CONFIG.LIMITE) * 100}%`;
    document.getElementById('barPartial').style.width = `${((paidCount + partialCount) / CONFIG.LIMITE) * 100}%`;
    document.getElementById('barPaid').style.width = `${(paidCount / CONFIG.LIMITE) * 100}%`;
    document.getElementById('txtPaid').innerText = `${paidCount} Pagos`;
    document.getElementById('txtPartial').innerText = `${partialCount} Parc`;
    document.getElementById('txtPend').innerText = `${parts.length - paidCount - partialCount} Pend`;
    document.getElementById('pMoney').innerText = `ARRECADADO: R$ ${totalMoney.toLocaleString('pt-BR',{minimumFractionDigits:2})}`;
}

function renderList(){
    const div = document.getElementById('listaDiv'); div.innerHTML='';
    const term = document.getElementById('buscar').value.toUpperCase();
    parts.forEach((p, index) => {
        const v = p.valorPago||0;
        if(filtro==='pagos' && v < CONFIG.VALOR) return;
        if(filtro==='pendentes' && v > 0) return;
        if(filtro==='parciais' && (v == 0 || v >= CONFIG.VALOR)) return;
        if(term && !p.nome.includes(term)) return;
        const isSel = sels.some(s=>s.key===p.key);
        const el = document.createElement('div');
        el.className = `list-item ${isSel?'selected':''}`;
        el.innerHTML = `
            <div class="item-left">
                <div class="checkbox-icon">${isSel?'☑️':'🔲'}</div>
                <div class="item-name">${(index+1).toString().padStart(2,'0')}. ${p.nome}</div>
            </div>
            <div class="pay-btn-container">
                ${v < CONFIG.VALOR ? `<button class="btn-pay-row" onclick="event.stopPropagation(); window.triggerCheckout('${p.nome}', '${p.telefone}', this, '${p.key}')"><i data-lucide="credit-card" style="width:12px"></i> PAGAR</button>` : ''}
            </div>
            <div class="item-right"><div class="status-emoji">${v >= CONFIG.VALOR ? '🟢' : (v > 0 ? '⚠️' : '🔴')}</div></div>
        `;
        el.querySelector('.item-left').onclick = () => {
            const idx = sels.findIndex(s=>s.key===p.key);
            if(idx>=0) sels.splice(idx,1); else sels.push(p);
            renderList();
        };
        el.querySelector('.item-right').onclick = () => { sels=[p]; askPass('pagamento'); };
        div.appendChild(el);
    });
    lucide.createIcons();
}

document.getElementById('btnCadastrar').onclick = async () => {
    const n = document.getElementById('nome').value.toUpperCase().trim(), t = document.getElementById('telefone').value.trim();
    if(!n || !t) return alert("Preencha Nome e Telefone!");
    const btn = document.getElementById('btnCadastrar'); btn.disabled = true; btn.innerHTML = `<div class="spinner"></div>`;
    try {
        const novoRef = await push(dbRef, {nome: n, telefone: t, valorPago: 0});
        await updateData();
        document.getElementById('confPix').innerText = CONFIG.PIX; document.getElementById('modalConf').style.display = 'flex';
        document.getElementById('btnPagarCheckout').onclick = (e) => window.triggerCheckout(n, t, e.currentTarget, novoRef.key);
        document.getElementById('btnZapConf').onclick = () => window.open(`https://wa.me/55${CONFIG.PIX.replace(/\D/g,'')}?text=Novo cadastro: ${n}`);
        confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 } });
    } catch (e) { alert("Erro ao cadastrar."); } finally { btn.disabled = false; btn.innerHTML = `🚀 PARTICIPAR`; }
};

async function execAcao(){
    if(acao === 'pagamento'){
        document.getElementById('pgtoNome').innerText = sels[0].nome;
        document.getElementById('pgtoValor').value = sels[0].valorPago||'';
        document.getElementById('modalPagamento').style.display='flex';
    } else if(acao === 'excluir' && confirm(`Excluir selecionados?`)){
        const u={}; sels.forEach(p=>u[`participantes/${p.key}`]=null); await update(ref(db),u); sels=[]; updateData(); renderList();
    }
}

document.getElementById('btnSalvarPgto').onclick = async () => {
    const v = parseFloat(document.getElementById('pgtoValor').value) || 0;
    const u={}; sels.forEach(p=>u[`participantes/${p.key}/valorPago`]=v); await update(ref(db),u);
    fecharModal('modalPagamento'); sels=[]; updateData(); renderList();
};

document.getElementById('btnZapGroup').onclick = () => window.open("https://chat.whatsapp.com/Fdl9PzkiEBq9TnJHtlu2Rm");
document.getElementById('buscar').oninput = () => renderList();

setInterval(()=>{
    const d=new Date("Dec 25, 2026 23:59:59")-new Date(); if(d<0)return;
    document.getElementById('dias').innerText=Math.floor(d/864e5).toString().padStart(2,'0');
    document.getElementById('horas').innerText=Math.floor((d%864e5)/36e5).toString().padStart(2,'0');
    document.getElementById('minutos').innerText=Math.floor((d%36e5)/6e4).toString().padStart(2,'0');
    document.getElementById('segundos').innerText=Math.floor((d%6e4)/1e3).toString().padStart(2,'0');
},1000);

updateData().then(() => verificarRetornoPagamento());
</script>
